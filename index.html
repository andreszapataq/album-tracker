<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Control de Láminas</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #f8f7f4;
    --surface: #ffffff;
    --surface2: #f1efe8;
    --border: rgba(0,0,0,0.1);
    --border-mid: rgba(0,0,0,0.2);
    --text: #1a1a18;
    --text-muted: #888780;
    --text-hint: #b4b2a9;
    --green-bg: #E1F5EE;
    --green-border: #5DCAA5;
    --green-text: #0F6E56;
    --amber-bg: #FAEEDA;
    --amber-border: #EF9F27;
    --amber-text: #854F0B;
    --accent: #1D9E75;
    --radius: 8px;
    --radius-lg: 12px;
  }

  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #1a1a18;
      --surface: #242422;
      --surface2: #2c2c2a;
      --border: rgba(255,255,255,0.1);
      --border-mid: rgba(255,255,255,0.2);
      --text: #f1efe8;
      --text-muted: #888780;
      --text-hint: #5f5e5a;
      --green-bg: #04342C;
      --green-border: #0F6E56;
      --green-text: #9FE1CB;
      --amber-bg: #412402;
      --amber-border: #854F0B;
      --amber-text: #FAC775;
    }
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 1.5rem 1rem 3rem;
  }

  header {
    text-align: center;
    margin-bottom: 2rem;
  }

  header h1 {
    font-size: 22px;
    font-weight: 500;
    letter-spacing: -0.3px;
  }

  header p {
    font-size: 13px;
    color: var(--text-muted);
    margin-top: 4px;
  }

  .card {
    background: var(--surface);
    border: 0.5px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 1rem 1.25rem;
    margin-bottom: 1rem;
  }

  #setup {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  #setup label {
    font-size: 12px;
    color: var(--text-muted);
    margin-bottom: 2px;
    display: block;
  }

  input[type=text], input[type=number] {
    width: 100%;
    padding: 10px 12px;
    font-size: 15px;
    border: 0.5px solid var(--border-mid);
    border-radius: var(--radius);
    background: var(--surface2);
    color: var(--text);
    outline: none;
    font-family: inherit;
    -webkit-appearance: none;
  }

  input[type=text]:focus, input[type=number]:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(29,158,117,0.15);
  }

  button {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    padding: 10px 16px;
    font-size: 14px;
    font-family: inherit;
    border-radius: var(--radius);
    border: 0.5px solid var(--border-mid);
    background: transparent;
    color: var(--text);
    cursor: pointer;
    transition: background 0.15s;
    -webkit-tap-highlight-color: transparent;
  }

  button:active { transform: scale(0.98); }
  button:hover { background: var(--surface2); }

  #init-btn {
    background: var(--accent);
    color: #fff;
    border-color: var(--accent);
    font-weight: 500;
    width: 100%;
    padding: 12px;
  }

  #init-btn:hover { background: #17856a; }

  #tracker { display: none; }

  #stats {
    display: grid;
    grid-template-columns: repeat(3, minmax(0,1fr));
    gap: 10px;
    margin-bottom: 1rem;
  }

  .stat {
    background: var(--surface2);
    border-radius: var(--radius);
    padding: 0.75rem 0.5rem;
    text-align: center;
  }

  .stat-label { font-size: 11px; color: var(--text-muted); margin-bottom: 4px; }
  .stat-val { font-size: 22px; font-weight: 500; }

  #progress-bar {
    height: 6px;
    background: var(--surface2);
    border-radius: 3px;
    margin-bottom: 1rem;
    overflow: hidden;
  }

  #progress-fill {
    height: 100%;
    background: var(--accent);
    border-radius: 3px;
    transition: width 0.3s ease;
    width: 0%;
  }

  .legend {
    display: flex;
    gap: 12px;
    margin-bottom: 1rem;
    flex-wrap: wrap;
  }

  .leg {
    display: flex;
    align-items: center;
    gap: 5px;
    font-size: 12px;
    color: var(--text-muted);
  }

  .leg-dot {
    width: 12px;
    height: 12px;
    border-radius: 3px;
    flex-shrink: 0;
  }

  #filter-bar {
    display: flex;
    gap: 6px;
    margin-bottom: 1rem;
    flex-wrap: wrap;
  }

  .fbtn {
    font-size: 12px;
    padding: 5px 12px;
    border-radius: 20px;
    border: 0.5px solid var(--border-mid);
    background: transparent;
    color: var(--text-muted);
    cursor: pointer;
    transition: all 0.15s;
  }

  .fbtn.active {
    background: var(--text);
    color: var(--bg);
    border-color: var(--text);
  }

  #grid {
    display: grid;
    gap: 4px;
    margin-bottom: 1rem;
  }

  .cell {
    aspect-ratio: 1;
    border-radius: 5px;
    border: 0.5px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 10px;
    cursor: pointer;
    user-select: none;
    color: var(--text-hint);
    transition: background 0.1s, border-color 0.1s;
    -webkit-tap-highlight-color: transparent;
    position: relative;
  }

  .cell.have {
    background: var(--green-bg);
    color: var(--green-text);
    border-color: var(--green-border);
    font-weight: 500;
  }

  .cell.repeated {
    background: var(--amber-bg);
    color: var(--amber-text);
    border-color: var(--amber-border);
    font-weight: 500;
  }

  .cell.hidden { display: none; }

  #actions {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }

  #actions button {
    flex: 1;
    min-width: 120px;
    font-size: 13px;
    padding: 9px 12px;
  }

  #reset-btn { color: #A32D2D; border-color: rgba(163,45,45,0.3); }

  #export-area {
    display: none;
    margin-top: 1rem;
    padding: 0.75rem 1rem;
    background: var(--surface2);
    border-radius: var(--radius);
    font-size: 13px;
    color: var(--text-muted);
    word-break: break-all;
    line-height: 1.6;
  }

  .hint {
    font-size: 11px;
    color: var(--text-hint);
    text-align: center;
    margin-top: 0.5rem;
  }

  .album-title {
    font-size: 16px;
    font-weight: 500;
    margin-bottom: 0.25rem;
  }

  .section-label {
    font-size: 12px;
    color: var(--text-muted);
    margin-bottom: 0.5rem;
  }
</style>
</head>
<body>

<header>
  <h1>Control de Láminas</h1>
  <p>Guarda tu progreso automáticamente</p>
</header>

<div class="card" id="setup-card">
  <div id="setup">
    <div>
      <label>Nombre del álbum</label>
      <input type="text" id="album-name" placeholder="Ej: Mundial 2026">
    </div>
    <div>
      <label>Total de láminas</label>
      <input type="number" id="total-input" min="1" max="1000" placeholder="Ej: 638">
    </div>
    <button id="init-btn" onclick="initAlbum()">Crear / Cargar álbum</button>
  </div>
</div>

<div id="tracker">
  <div class="card">
    <div class="album-title" id="album-display"></div>
    <div id="stats">
      <div class="stat"><div class="stat-label">Tengo</div><div class="stat-val" id="s-have">0</div></div>
      <div class="stat"><div class="stat-label">Faltan</div><div class="stat-val" id="s-miss">0</div></div>
      <div class="stat"><div class="stat-label">Completado</div><div class="stat-val" id="s-pct">0%</div></div>
    </div>
    <div id="progress-bar"><div id="progress-fill"></div></div>
    <div class="legend">
      <div class="leg"><div class="leg-dot" style="background:var(--green-bg);border:0.5px solid var(--green-border)"></div>Tengo</div>
      <div class="leg"><div class="leg-dot" style="background:var(--amber-bg);border:0.5px solid var(--amber-border)"></div>Repetida</div>
      <div class="leg"><div class="leg-dot" style="background:var(--surface2);border:0.5px solid var(--border)"></div>Falta</div>
    </div>
  </div>

  <div class="card">
    <div class="section-label">Filtrar láminas</div>
    <div id="filter-bar">
      <button class="fbtn active" onclick="setFilter('all',this)">Todas</button>
      <button class="fbtn" onclick="setFilter('have',this)">Tengo</button>
      <button class="fbtn" onclick="setFilter('miss',this)">Faltan</button>
      <button class="fbtn" onclick="setFilter('repeated',this)">Repetidas</button>
    </div>
    <div id="grid"></div>
    <p class="hint">Toca para marcar · Toca dos veces para repetida</p>
  </div>

  <div class="card">
    <div id="actions">
      <button onclick="markAll(true)">Marcar todas</button>
      <button onclick="markAll(false)">Desmarcar</button>
      <button onclick="showMissing()">Ver faltantes</button>
      <button id="reset-btn" onclick="resetAlbum()">Reiniciar</button>
    </div>
    <div id="export-area"></div>
  </div>

  <div style="text-align:center;margin-top:1rem;">
    <button onclick="changeAlbum()" style="font-size:13px;color:var(--text-muted);">Cambiar álbum</button>
  </div>
</div>

<script>
  let state = { name: '', total: 0, cells: [] };
  let curFilter = 'all';
  let tapTimers = {};

  function key(name) {
    return 'album_' + name.replace(/\s+/g,'_').toLowerCase();
  }

  function saveState() {
    localStorage.setItem(key(state.name), JSON.stringify(state));
    localStorage.setItem('album_last', key(state.name));
  }

  function loadState(k) {
    const raw = localStorage.getItem(k);
    return raw ? JSON.parse(raw) : null;
  }

  function initAlbum() {
    const name = document.getElementById('album-name').value.trim();
    const total = parseInt(document.getElementById('total-input').value);
    if (!name) { alert('Escribe el nombre del álbum.'); return; }
    if (!total || total < 1) { alert('Ingresa el número total de láminas.'); return; }
    const k = key(name);
    const saved = loadState(k);
    if (saved && saved.total === total) {
      state = saved;
    } else {
      if (saved && saved.total !== total && !confirm('Ya existe un álbum con ese nombre pero diferente cantidad. ¿Crear uno nuevo?')) return;
      state = { name, total, cells: Array(total).fill(0) };
      saveState();
    }
    document.getElementById('album-display').textContent = state.name;
    document.getElementById('setup-card').style.display = 'none';
    document.getElementById('tracker').style.display = 'block';
    renderGrid();
    updateStats();
  }

  function gridCols() {
    const t = state.total;
    if (t <= 100) return 10;
    if (t <= 300) return 12;
    if (t <= 600) return 15;
    return 20;
  }

  function renderGrid() {
    const g = document.getElementById('grid');
    g.innerHTML = '';
    const cols = gridCols();
    g.style.gridTemplateColumns = 'repeat(' + cols + ', minmax(0,1fr))';
    for (let i = 0; i < state.total; i++) {
      const d = document.createElement('div');
      d.className = 'cell';
      d.textContent = i + 1;
      d.dataset.i = i;
      d.addEventListener('click', () => handleTap(i, d));
      g.appendChild(d);
    }
    refreshCells();
    applyFilter();
  }

  function handleTap(i, el) {
    if (tapTimers[i]) {
      clearTimeout(tapTimers[i]);
      delete tapTimers[i];
      // double tap → repeated
      state.cells[i] = state.cells[i] === 2 ? 1 : 2;
      saveState(); refreshCells(); applyFilter(); updateStats();
    } else {
      tapTimers[i] = setTimeout(() => {
        delete tapTimers[i];
        // single tap → toggle have/miss
        state.cells[i] = state.cells[i] === 0 ? 1 : 0;
        if (state.cells[i] === 0 && el.classList.contains('repeated')) state.cells[i] = 0;
        saveState(); refreshCells(); applyFilter(); updateStats();
      }, 280);
    }
  }

  function refreshCells() {
    document.querySelectorAll('.cell').forEach((c, i) => {
      c.classList.remove('have','repeated');
      if (state.cells[i] === 1) c.classList.add('have');
      else if (state.cells[i] === 2) c.classList.add('repeated');
    });
  }

  function updateStats() {
    const have = state.cells.filter(x => x === 1).length;
    const rep  = state.cells.filter(x => x === 2).length;
    const total = state.total;
    const miss = total - have - rep;
    const pct  = Math.round(((have + rep) / total) * 100);
    document.getElementById('s-have').textContent = have + rep;
    document.getElementById('s-miss').textContent = miss;
    document.getElementById('s-pct').textContent = pct + '%';
    document.getElementById('progress-fill').style.width = pct + '%';
  }

  function setFilter(f, btn) {
    curFilter = f;
    document.querySelectorAll('.fbtn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    applyFilter();
  }

  function applyFilter() {
    document.querySelectorAll('.cell').forEach((c, i) => {
      const v = state.cells[i];
      let show = true;
      if (curFilter === 'have') show = v === 1;
      else if (curFilter === 'miss') show = v === 0;
      else if (curFilter === 'repeated') show = v === 2;
      c.classList.toggle('hidden', !show);
    });
  }

  function markAll(v) {
    state.cells = state.cells.map(() => v ? 1 : 0);
    saveState(); refreshCells(); applyFilter(); updateStats();
  }

  function showMissing() {
    const area = document.getElementById('export-area');
    const missing = state.cells.map((v,i) => v === 0 ? i+1 : null).filter(Boolean);
    area.style.display = 'block';
    area.textContent = missing.length === 0
      ? '¡Álbum completo! 🎉'
      : 'Faltan ' + missing.length + ': ' + missing.join(', ');
  }

  function resetAlbum() {
    if (!confirm('¿Reiniciar el álbum? Se perderá todo el progreso.')) return;
    state.cells = Array(state.total).fill(0);
    saveState(); refreshCells(); updateStats();
    document.getElementById('export-area').style.display = 'none';
  }

  function changeAlbum() {
    document.getElementById('setup-card').style.display = 'block';
    document.getElementById('tracker').style.display = 'none';
  }

  window.onload = () => {
    const lastKey = localStorage.getItem('album_last');
    if (lastKey) {
      const saved = loadState(lastKey);
      if (saved) {
        document.getElementById('album-name').value = saved.name;
        document.getElementById('total-input').value = saved.total;
      }
    }
  };
</script>
</body>
</html>
